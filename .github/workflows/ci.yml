name: CI

# Primary CI: build + lint + test on stable Rust across Linux and Windows.
# This is the gate that blocks merges. Miri/Loom live in separate workflows
# because they are nightly-only, slower, and fail-locally-noisy.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Keep incremental off in CI: avoids spurious cache invalidation costs
  # and makes timings comparable across runs.
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --release
        run: cargo test --release --locked --all-targets

  bench-smoke:
    # Sanity-check that the benchmark binary still runs end-to-end. Uses the
    # `official-small` preset (few runs, small dataset) to stay under
    # the CI time budget.
    name: bench smoke
    runs-on: ubuntu-latest
    needs: [clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: official-small
        run: bash scripts/bench-official-small.sh
      - name: upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-official-small
          path: bench-out/
          if-no-files-found: warn
          retention-days: 7
